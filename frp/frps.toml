# frp/frps.toml — frps server configuration
# Installed to /etc/frp/frps.toml by bootstrap_server.sh
# Runs as systemd service: frps.service
#
# frps listens for frpc connections on port 7000 (internal only)
# HTTP virtual hosts served on port 80 → Traefik handles TLS
# Dashboard at port 7500 (localhost only — not exposed externally)

bindPort         = 7000
vhostHTTPPort    = 80

# Auth — token shared between frps and frpc
# Generated by bootstrap_server.sh from FRP_TOKEN env var
auth.method      = "token"
auth.token       = "{{ FRP_TOKEN }}"   # replaced by bootstrap_server.sh

# Dashboard (localhost only)
webServer.addr     = "127.0.0.1"
webServer.port     = 7500
webServer.user     = "admin"
webServer.password = "{{ FRP_TOKEN }}"

# Logging
log.to    = "/var/log/frps.log"
log.level = "warn"

# Allow frpc to register any subdomain under openautonomyx.com
subDomainHost = "openautonomyx.com"
