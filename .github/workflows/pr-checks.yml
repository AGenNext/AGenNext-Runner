name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Run unit tests
        run: pytest tests/ -q --tb=short

      - name: Validate compose files
        run: |
          python3 scripts/gen_ci_env.py
          docker compose -f docker-compose.yml --env-file .env.ci config --quiet
          echo "docker-compose.yml OK"
          docker compose -f docker-compose.business.yml --env-file .env.ci config --quiet
          echo "docker-compose.business.yml OK"
          rm -f .env.ci

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: playwright/Dockerfile
          failure-threshold: error

  # Auto-approve and merge Dependabot patch/minor PRs if tests pass
  dependabot-auto-merge:
    name: Auto-merge Dependabot
    runs-on: ubuntu-latest
    needs: test
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Auto-approve patch + minor updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch + minor updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
